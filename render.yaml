services:
  - type: web
    name: cyberguard-utm-landing
    runtime: node
    # free는 유휴 시 슬립됨. 상시 오픈을 위해 starter 사용
    plan: starter
    region: singapore
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      # 공개 접속 URL (배포 후 실제 도메인으로 덮어쓸 수 있음)
      - key: NEXT_PUBLIC_SITE_URL
        value: https://cyberguard-utm-landing.onrender.com
      - key: NEXT_PUBLIC_GTM_ID
        value: ""
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        value: ""
      - key: TURNSTILE_SECRET_KEY
        value: ""
